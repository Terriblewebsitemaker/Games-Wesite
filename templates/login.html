<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Terrible Website</title>
  <meta name="description" content="Login page for Terrible Website." />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">Terrible Website</a>
      <nav class="main-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
      <div class="header-actions">
        <a class="btn btn-primary" href="/">Back Home</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section login-section">
      <div class="container">
        <div class="auth-card glass-card">
          <h1>Login</h1>
          <p>Enter the password <strong>terriblewebsite</strong> to unlock the Games Thing.</p>

          {% if success %}
            <div class="alert alert-success">
              <p>Success! You have been logged in. Return to the homepage to continue exploring.</p>
            </div>
          {% elif error %}
            <div class="alert alert-error">
              <p>{{ error }}</p>
            </div>
          {% endif %}

          <form action="/login" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="yourname" autocomplete="username">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="password" required autocomplete="current-password">
            <div class="modal-actions">
              <button type="submit" class="btn btn-primary">Sign in</button>
              <a class="btn btn-outline" href="/">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
